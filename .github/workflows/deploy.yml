name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-north-1
  ECS_CLUSTER: quickbite-1
  ECR_REPO: analytics-service
  ECS_SERVICE: analytics-service

jobs:
  test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run tests
        run: |
          docker compose -f docker-compose.test.yml up \
            --build \
            --abort-on-container-exit \
            --exit-code-from analytics-integration-test

      - name: Stop containers
        if: always()
        run: docker compose -f docker-compose.test.yml down -v --remove-orphans

  deploy:
    name: Deploy
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        run: |
          REG=${{ steps.ecr.outputs.registry }}
          IMG=$REG/${{ env.ECR_REPO }}:${{ github.sha }}
          docker build -t "$IMG" -t "$REG/${{ env.ECR_REPO }}:latest" .
          docker push "$REG/${{ env.ECR_REPO }}" --all-tags

      - name: Deploy service
        run: aws ecs update-service --cluster "${{ env.ECS_CLUSTER }}" --service "${{ env.ECS_SERVICE }}" --force-new-deployment
